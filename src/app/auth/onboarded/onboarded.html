<p-card>
  <div class="flex flex-col items-center gap-3 p-3">
    <div class="bg-green-500 rounded-full p-4">
      <svg pIcon="check" size="32"></svg>
    </div>

    <h1 class="text-lg font-medium">You're all set!</h1>
    <h3 class="text-center text-muted">
      Your account and first project are ready to go. <br />
      Let's start shipping features.
    </h3>

    <div class="w-full bg-surface-700! p-2 rounded-md">
      @for (step of steps; track step) {
        <div class="flex items-center gap-2 text-sm text-secondary my-1">
          <svg pIcon="check-circle" size="16" class="text-green-400"></svg>
          <span>{{ step }}</span>
        </div>
      }
    </div>

    <button pButton class="w-full mt-2" variant="link" routerLink="/dashboard">
      Go To Dashboard
    </button>
  </div>
</p-card>
