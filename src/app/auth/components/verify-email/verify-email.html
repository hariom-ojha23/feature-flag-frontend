<p-card>
  <div class="flex flex-col items-center gap-3 p-3">
    <div class="bg-purple-400 rounded-full p-3">
      <svg pIcon="envelope" size="24"></svg>
    </div>

    <h1 class="text-lg font-medium">Check your inbox</h1>
    <h3 class="text-center text-muted">
      We have sent a verification code to <br />
      <button type="button" pButton variant="link">
        {{ session.user()?.email }}
      </button>
    </h3>

    <p-inputotp [length]="6" [(ngModel)]="otp" />

    <button pButton class="w-full mt-1" [disabled]="otp.length !== 6" (click)="verifyEmail()">
      Verify OTP
    </button>

    <h3 class="text-center mt-2 text-muted">
      Didn't get the code?
      <button type="button" pButton variant="link" [disabled]="timer()" (click)="resendCode()">
        Resend
        @if (timer() > 0) {
          <span>in {{ timer() }}s</span>
        }
      </button>
    </h3>
  </div>
</p-card>
