<p-card>
  <ng-template #header>
    <div class="flex justify-center p-4.5 pb-3.5">
      <app-logo-with-name width="14"></app-logo-with-name>
    </div>
  </ng-template>

  <ng-template #title>
    <h2 class="text-xl font-semibold">Welcome Back!</h2>
  </ng-template>
  <ng-template #subtitle>
    <p class="text-color-secondary">Sign in with your email to continue.</p>
  </ng-template>

  <form class="space-y-4 mt-3" [formGroup]="form">
    <p-inputgroup>
      <p-inputgroup-addon>
        <svg data-p-icon="envelope"></svg>
      </p-inputgroup-addon>
      <input
        pInputText
        placeholder="Email"
        type="email"
        [invalid]="invalidFields().email"
        [formControl]="form.controls.email"
      />
    </p-inputgroup>

    <p-inputgroup>
      <p-inputgroup-addon>
        <svg data-p-icon="lock"></svg>
      </p-inputgroup-addon>
      <input
        pInputText
        placeholder="Password"
        type="password"
        [invalid]="invalidFields().password"
        [formControl]="form.controls.password"
      />
    </p-inputgroup>

    <button pButton class="w-full" type="submit" (click)="login()">Login</button>
  </form>

  <div class="flex justify-center my-3">
    <button type="button" pButton variant="link" (click)="forgotPassword()">
      Forgot Password?
    </button>
  </div>

  <div class="text-center text-sm">
    Do not have an account?
    <button type="button" pButton variant="link" routerLink="/register">Register</button>
  </div>
</p-card>
