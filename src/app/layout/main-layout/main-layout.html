<div class="border border-surface-200 dark:border-surface-700 rounded-lg overflow-hidden">
  <p-sidebar-layout class="h-screen relative!">
    <app-main-sidebar [navGroups]="navGroups()" [isMobile]="isMobile()"></app-main-sidebar>

    <p-sidebar-main>
      <header
        class="flex h-12 items-center gap-2 border-b border-surface-200 dark:border-surface-700 px-4"
      >
        @if (isMobile()) {
          <button
            class="mr-2"
            pButton
            pSidebarTrigger
            target="main-sidebar"
            severity="secondary"
            text
          >
            <svg pIcon="bars" size="18"></svg>
          </button>
        }

        <p>{{ selectedMenu() }}</p>
      </header>
      <div class="flex-1 p-4 flex flex-col gap-4">
        <router-outlet />
      </div>
    </p-sidebar-main>
  </p-sidebar-layout>
</div>
