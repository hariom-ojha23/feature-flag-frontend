<section id="faq" class="faq section-container" aria-labelledby="faq-heading">
  <div class="faq__header">
    <span class="section-eyebrow">
      <svg pIcon="question-circle" size="22" aria-hidden="true"></svg>
      Questions, answered
    </span>
    <h2 id="faq-heading" class="faq__title">
      Frequently asked <span class="gradient-text">questions</span>
    </h2>
    <p class="faq__subtitle">
      Can't find what you're looking for? Reach out and our team will get back to you.
    </p>
  </div>

  <p-accordion value="0">
    @for (item of faqs; track item.question) {
      <p-accordion-panel [value]="item.value">
        <p-accordion-header>{{ item.question }}</p-accordion-header>
        <p-accordion-content>
          <p class="text-muted">{{ item.answer }}</p>
        </p-accordion-content>
      </p-accordion-panel>
    }
  </p-accordion>
</section>
